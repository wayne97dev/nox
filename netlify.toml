# Netlify config for the Nox monorepo.
# The Next.js dApp lives in web/ and is built as a fully static export
# (output: "export" in next.config.mjs) — no serverless functions, no plugin.

[build]
  base = "web"
  command = "npm run build"
  publish = "out"           # relative to base → web/out

[build.environment]
  NODE_VERSION = "20"
